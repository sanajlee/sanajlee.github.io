# About Section
# about_title: About Me (Use this to override about section title)
about_profile_image: images/frz_small.jpg
about_content: | # this will include new lines to allow paragraphs
  Hi there! My name is Sangah Lee 이상아, an assistant professor in the Department of Linguistics at Seoul National University.

  I am a computational linguist interested in multilingual and low-resource scenarios of language modeling. I'm also interested in processing informal texts including slang, coinage, typos, etc. Recently, I'm on a few topics bridging computational linguistics with various fields of theoretical linguistics.

  My CV is [here](https://github.com/sanajlee/sanajlee.github.io/blob/main/Resume_20230216.pdf): updated Feb 2023.


content:
  - title: Experience
    layout: list
    content:
      - layout: right
        title: Seoul National University
        sub_title: Department of Linguistics
        caption: 2022.9. - present
        description: | # this will include new lines to allow paragraphs
          Assistant Professor
      - layout: right
        title: Seoul National University
        sub_title: Faculty of Liberal Education
        caption: 2022.3. - 2022.8.
        description: | # this will include new lines to allow paragraphs
          Assistant Teaching Professor

          
  - title: Education
    layout: list
    content:
      - layout: top-right
        title: Institution name
        sub_title: Qualifications (eg. BA Performing Arts)
        caption: Date Range (eg. 2016 - 2019)
        quote: >
          Short institution or course description (optional)
        description: | # this will include new lines to allow paragraphs
          Description of qualification
  - title: A Little More About Me
    layout: text
    content: | # this will include new lines to allow paragraphs
      This is where you can write a little more about yourself. You could title this section **Interests** and include some of your other interests.

      Or you could title it **Skills** and write a bit more about things that make you more desirable, like *leadership* or *teamwork*

# Footer
footer_show_references: true
# references_title: References on request (Override references text)

# Build settings
# theme: modern-resume-theme (Use this is you are hosting your resume yourself)
# remote_theme: sproogen/modern-resume-theme (Use this if you are hosting your resume on GitHub)

sass:
  sass_dir: _sass
  style: compressed

plugins:
 - jekyll-seo-tag

exclude : [
  "Gemfile",
  "Gemfile.lock",
  "node_modules",
  "vendor/bundle/",
  "vendor/cache/",
  "vendor/gems/",
  "vendor/ruby/",
  "lib/",
  "scripts/",
  "docker-compose.yml",
  ]
